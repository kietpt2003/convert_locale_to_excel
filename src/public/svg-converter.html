<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart SVG Converter for React Native</title>
    <link rel="stylesheet" href="/css/style-svg-converter.css" />
    <link
      href="https://unpkg.com/lucide-icons/dist/umd/lucide.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <a href="/index.html" class="back-link" title="Back to Dashboard">
          <svg
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="m15 18-6-6 6-6" />
          </svg>
        </a>
        <div>
          <h2>Smart SVG Converter</h2>
          <p class="subtitle">
            Tối ưu hóa và chuẩn hóa SVG cho React Native (currentColor ready)
          </p>
        </div>
      </div>

      <div class="main-grid">
        <div class="panel">
          <div class="panel-header">
            <h3>1. Input SVG Code</h3>

            <div class="file-upload-zone">
              <label for="svg-file-input" class="custom-file-upload">
                <svg
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                  <polyline points="17 8 12 3 7 8" />
                  <line x1="12" x2="12" y1="3" y2="15" />
                </svg>
                Upload .svg File
              </label>
              <input type="file" id="svg-file-input" accept=".svg" hidden />
            </div>
          </div>

          <textarea
            id="svg-input-textarea"
            placeholder="Paste your SVG code from Figma here..."
          ></textarea>

          <div class="action-btns">
            <button class="btn-analyze" id="btn-analyze">
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
              </svg>
              Analyze & Convert
            </button>
            <button class="btn-magic" id="btn-trace" disabled>
              🪄 Magical Trace (Fake SVG → Vector)
            </button>
          </div>
        </div>

        <div class="panel right-panel">
          <div class="panel-header">
            <h3>2. Result & Preview</h3>
            <button class="btn-copy" id="btn-copy">
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <rect width="14" height="14" x="8" y="8" rx="2" ry="2" />
                <path
                  d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"
                />
              </svg>
              Copy Code
            </button>
          </div>

          <div id="status-box" class="status-box"></div>

          <div class="output-container">
            <div class="preview-box" id="preview-box">
              <div class="preview-icon" id="preview-icon"></div>
              <div id="preview-placeholder">
                <svg
                  width="48"
                  height="48"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="#cbd5e1"
                  stroke-width="1.5"
                >
                  <rect width="18" height="18" x="3" y="3" rx="2" ry="2" />
                  <circle cx="9" cy="9" r="2" />
                  <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21" />
                </svg>
                <p>Icon Preview</p>
              </div>
            </div>

            <textarea
              id="svg-output-textarea"
              readonly
              placeholder="React Native SVG code will appear here..."
            ></textarea>
          </div>
        </div>
      </div>
    </div>

    <div id="agent-widget"></div>

    <script type="module" src="/js/svg-converter.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/imagetracerjs/imagetracer_v1.2.1.js"></script>
  </body>
</html>
