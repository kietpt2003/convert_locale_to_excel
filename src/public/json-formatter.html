<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart JSON Formatter & TS Generator</title>
    <link rel="stylesheet" href="/css/style-svg-converter.css" />
    <style>
      /* Style riêng cho chế độ Dark Mode của ô Output */
      textarea#json-output {
        transition:
          background-color 0.3s,
          color 0.3s,
          border-color 0.3s;
      }
      textarea#json-output.dark-mode {
        background-color: #1e293b;
        color: #f8fafc;
        border-color: #334155;
      }
      .btn-theme {
        background-color: #f0fdfa;
        color: #0d9488;
        border: 1px solid #99f6e4;
      }
      .btn-theme:hover {
        background-color: #ccfbf1;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <a href="/index.html" class="back-link" title="Back to Dashboard">
          <svg
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="m15 18-6-6 6-6" />
          </svg>
        </a>
        <div>
          <h2>Smart JSON Formatter & TS Gen</h2>
          <p class="subtitle">
            Format, Validate và tự động sinh TypeScript Interfaces từ JSON
          </p>
        </div>
      </div>

      <div class="main-grid">
        <div class="panel">
          <div class="panel-header">
            <h3>1. Paste JSON Here</h3>
            <button
              class="btn-copy"
              id="btn-clear"
              style="background: #fee2e2; color: #ef4444; border-color: #fca5a5"
            >
              Clear
            </button>
          </div>

          <textarea
            id="json-input"
            placeholder='{"name": "Kiet Junior", "role": "AI Agent"}'
            style="height: 400px"
          ></textarea>

          <div class="action-btns" style="flex-direction: row; flex-wrap: wrap">
            <button class="btn-analyze" id="btn-format">
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M21 10H3M21 6H3M21 14H3M21 18H3" />
              </svg>
              Format (Pretty)
            </button>
            <button
              class="btn-analyze"
              id="btn-minify"
              style="background: #0f766e"
            >
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M4 14l6-6 2 2 8-8" />
              </svg>
              Minify
            </button>
            <button class="btn-magic" id="btn-ts-gen" style="flex-basis: 100%">
              🪄 Auto-Gen TypeScript Interfaces
            </button>
          </div>
        </div>

        <div class="panel right-panel">
          <div class="panel-header">
            <h3>2. Output</h3>
            <div style="display: flex; gap: 10px">
              <button class="btn-copy btn-theme" id="btn-theme-toggle">
                <svg
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
                </svg>
                Dark Theme
              </button>
              <button class="btn-copy" id="btn-copy-json">
                <svg
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <rect width="14" height="14" x="8" y="8" rx="2" ry="2" />
                  <path
                    d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"
                  />
                </svg>
                Copy Result
              </button>
            </div>
          </div>

          <div id="status-box" class="status-box"></div>

          <div class="output-container" style="height: 100%">
            <textarea
              id="json-output"
              readonly
              placeholder="Result will appear here..."
              style="height: 100%; flex: 1"
            ></textarea>
          </div>
        </div>
      </div>
    </div>

    <div id="agent-widget"></div>

    <script type="module" src="/js/json-formatter.js"></script>
  </body>
</html>
