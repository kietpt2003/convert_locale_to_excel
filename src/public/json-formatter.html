<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart JSON Formatter & TS Generator</title>
    <link rel="stylesheet" href="/css/style-svg-converter.css" />
    <link rel="stylesheet" href="/css/style-json-formatter.css" />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <a href="/index.html" class="back-link" title="Back to Dashboard">
          <svg
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="m15 18-6-6 6-6" />
          </svg>
        </a>
        <div>
          <h2>Smart JSON Formatter & TS Gen</h2>
          <p class="subtitle">
            Format, Validate và tự động sinh TypeScript Interfaces từ JSON
          </p>
        </div>
      </div>

      <div class="main-grid">
        <div class="panel">
          <div class="panel-header">
            <h3>1. Paste JSON Here</h3>
            <button
              class="btn-copy"
              id="btn-clear"
              style="background: #fee2e2; color: #ef4444; border-color: #fca5a5"
            >
              Clear
            </button>
          </div>

          <textarea
            id="json-input"
            placeholder='{"name": "Kiet Junior", "role": "AI Agent"}'
            style="height: 400px"
          ></textarea>

          <div class="action-btns" style="flex-direction: row; flex-wrap: wrap">
            <button class="btn-analyze" id="btn-format">
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M21 10H3M21 6H3M21 14H3M21 18H3" />
              </svg>
              Format (Pretty)
            </button>
            <button
              class="btn-analyze"
              id="btn-minify"
              style="background: #0f766e"
            >
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M4 14l6-6 2 2 8-8" />
              </svg>
              Minify
            </button>
            <button class="btn-magic" id="btn-ts-gen" style="flex-basis: 100%">
              🪄 Auto-Gen TypeScript Interfaces
            </button>
          </div>
        </div>

        <div class="panel right-panel">
          <div class="panel-header">
            <h3>2. Output</h3>
            <div style="display: flex; gap: 10px; align-items: center">
              <div
                class="search-container"
                id="search-bar"
                style="
                  display: none;
                  display: flex;
                  align-items: center;
                  background: #fff;
                  border: 1px solid #ddd;
                  padding: 2px 8px;
                  border-radius: 6px;
                "
              >
                <input
                  type="text"
                  id="search-input"
                  placeholder="Find..."
                  style="
                    border: none;
                    outline: none;
                    font-size: 13px;
                    width: 100px;
                  "
                />
                <span
                  id="search-count"
                  style="font-size: 12px; color: #666; margin: 0 5px"
                  >0/0</span
                >
                <button
                  id="btn-prev"
                  style="
                    border: none;
                    background: none;
                    cursor: pointer;
                    padding: 0 2px;
                  "
                >
                  ▲
                </button>
                <button
                  id="btn-next"
                  style="
                    border: none;
                    background: none;
                    cursor: pointer;
                    padding: 0 2px;
                  "
                >
                  ▼
                </button>
              </div>

              <button class="btn-copy btn-theme" id="btn-theme-toggle">
                Dark Theme
              </button>
              <button class="btn-copy" id="btn-copy-json">Copy Result</button>
            </div>
          </div>

          <div id="status-box" class="status-box"></div>

          <div
            class="output-container"
            style="
              height: 100%;
              overflow: auto;
              background: #fff;
              border: 1px solid #e2e8f0;
              border-radius: 8px;
            "
          >
            <div
              id="json-output"
              class="json-render-area"
              style="
                padding: 15px;
                font-family: &quot;Fira Code&quot;, monospace;
                white-space: pre;
                font-size: 14px;
              "
            ></div>
          </div>
        </div>
      </div>
    </div>

    <div id="agent-widget"></div>

    <script type="module" src="/js/json-formatter.js"></script>
  </body>
</html>
