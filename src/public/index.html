<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Key Generator Tool</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
        text-align: center;
      }

      .avatar-wrapper {
        position: relative;
        display: inline-block;
      }

      .developer-avatar {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        object-fit: cover;
        border: 3px solid #4caf50;
      }

      .verified-badge {
        position: absolute;
        bottom: 5px;
        right: 5px;
        width: 20px;
        height: 20px;
        background: #4caf50;
        border-radius: 50%;
        border: 2px solid white;
      }

      .developer-name {
        margin-top: 10px;
        font-weight: bold;
      }

      .developer-links img {
        margin: 5px;
      }

      .form-group {
        margin-bottom: 12px;
      }

      input {
        padding: 6px;
        width: 250px;
      }

      button {
        padding: 8px 16px;
        cursor: pointer;
      }

      .tabs {
        display: flex;
        justify-content: center;
        margin-top: 30px;
        cursor: pointer;
      }

      .tab {
        padding: 10px 20px;
        border: 1px solid #ccc;
        border-bottom: none;
        background: #f5f5f5;
      }

      .tab.active {
        background: white;
        font-weight: bold;
      }

      .tab-content {
        border: 1px solid #ccc;
        padding: 20px;
        display: none;
        margin-top: -1px;
      }

      .tab-content.active {
        display: block;
      }

      .spinner {
        margin: 10px auto;
        width: 30px;
        height: 30px;
        border: 4px solid #ccc;
        border-top: 4px solid #4caf50;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .dev-mode-buttons {
        margin-bottom: 15px;
      }

      .dev-mode-buttons button {
        padding: 8px 16px;
        margin: 0 5px;
        border: 1px solid #ccc;
        background: #f5f5f5;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .dev-mode-buttons button.active {
        background: #4caf50;
        color: white;
        border-color: #4caf50;
      }

      .dev-mode-buttons button:hover {
        opacity: 0.8;
      }

      #visit-count {
        transition: transform 0.3s ease;
      }
    </style>
  </head>

  <body>
    <div class="avatar-wrapper">
      <img
        class="developer-avatar"
        src="assets/avatar.JPG"
        alt="Developer Avatar"
      />
      <div class="verified-badge"></div>
    </div>

    <div class="developer-name">
      Phạm Tuấn Kiệt – Fullstack Developer & React Native Specialist
    </div>

    <div class="developer-links">
      <a href="https://www.facebook.com/tuankiet29012003" target="_blank">
        <img
          src="https://img.shields.io/badge/Facebook-1877F2?style=for-the-badge&logo=facebook&logoColor=white"
        />
      </a>
      <a href="https://www.linkedin.com/in/kietpt2003" target="_blank">
        <img
          src="https://img.shields.io/badge/LinkedIn-0077B5?style=for-the-badge&logo=linkedin&logoColor=white"
        />
      </a>
    </div>

    <h2>Key Generator Tool</h2>

    <div style="margin: 20px 0">
      <h3>👀 Total Visitors</h3>
      <div id="visit-count" style="font-size: 32px; font-weight: bold">0</div>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab(0)">For Dev</div>
      <div class="tab" onclick="switchTab(1)">For CS</div>
    </div>

    <div class="tab-content active">
      <h3>Dev Tools</h3>

      <div class="dev-mode-buttons">
        <button
          id="btn-js"
          class="active"
          onclick="switchDevMode('js-to-excel')"
        >
          JS → Excel
        </button>
        <button id="btn-excel" onclick="switchDevMode('excel-to-js')">
          Excel → JS
        </button>
      </div>

      <!-- JS → Excel -->
      <form id="form-dev-js">
        <div class="form-group">
          <input type="file" name="file" accept=".js" required />
        </div>

        <button id="button-dev-js" type="submit">Convert JS → Excel</button>
      </form>

      <!-- Excel → JS -->
      <form id="form-dev-excel" style="display: none">
        <div class="form-group">
          <input type="file" name="file" accept=".xlsx" required />
        </div>

        <div class="form-group">
          <input
            type="text"
            name="keyColumn"
            placeholder="Key Column (default 1)"
          />
        </div>

        <div class="form-group">
          <input
            type="text"
            name="valueColumn"
            placeholder="Value Column (default 2)"
          />
        </div>

        <button id="button-dev-excel" type="submit">Convert Excel → JS</button>
      </form>

      <div id="loading-dev" style="margin-top: 15px; display: none">
        <div class="spinner"></div>
        <div>Processing...</div>
      </div>

      <div id="result-dev" style="margin-top: 20px; display: none">
        <p><strong>Download Link:</strong></p>
        <a id="download-link-dev" href="#" target="_blank"></a>
      </div>
    </div>

    <div class="tab-content">
      <h3>Key generator (2 files)</h3>
      <form id="form-cs">
        <div class="form-group">
          <input type="file" name="file1" required />
        </div>

        <div class="form-group">
          <input
            type="text"
            name="keyColumnFile1"
            placeholder="Key Column File 1"
          />
        </div>

        <div class="form-group">
          <input
            type="text"
            name="valueColumnFile1"
            placeholder="Value Column File 1"
          />
        </div>

        <hr />

        <div class="form-group">
          <input type="file" name="file2" required />
        </div>

        <div class="form-group">
          <input
            type="text"
            name="keyColumnFile2"
            placeholder="Key Column File 2"
          />
        </div>

        <div class="form-group">
          <input
            type="text"
            name="valueColumnFile2"
            placeholder="Value Column File 2"
          />
        </div>

        <button id="button-cs" type="submit">Merge</button>
      </form>

      <div id="loading-cs" style="margin-top: 15px; display: none">
        <div class="spinner"></div>
        <div>Processing...</div>
      </div>

      <div id="result-cs" style="margin-top: 20px; display: none">
        <p><strong>Download Link:</strong></p>
        <a id="download-link-cs" href="#" target="_blank"></a>
      </div>
    </div>

    <script type="module">
      import { put } from "https://esm.sh/@vercel/blob";

      window.switchTab = function (index) {
        const tabs = document.querySelectorAll(".tab");
        const contents = document.querySelectorAll(".tab-content");

        tabs.forEach((t, i) => {
          t.classList.toggle("active", i === index);
          contents[i].classList.toggle("active", i === index);
        });
      };

      window.downloadFile = function (blob, filename) {
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        a.click();
        window.URL.revokeObjectURL(url);
      };

      window.switchDevMode = function (mode) {
        const resultDiv = document.getElementById("result-dev");
        const link = document.getElementById("download-link-dev");

        link.href = "";
        link.textContent = "";
        resultDiv.style.display = "none";

        const formJs = document.getElementById("form-dev-js");
        const formExcel = document.getElementById("form-dev-excel");

        const btnJs = document.getElementById("btn-js");
        const btnExcel = document.getElementById("btn-excel");

        if (mode === "js-to-excel") {
          formJs.style.display = "block";
          formExcel.style.display = "none";

          btnJs.classList.add("active");
          btnExcel.classList.remove("active");
        } else {
          formJs.style.display = "none";
          formExcel.style.display = "block";

          btnJs.classList.remove("active");
          btnExcel.classList.add("active");
        }
      };

      function animateCount(element, to) {
        element.style.transform = "scale(1.2)";

        const duration = 1000;
        const startTime = performance.now();

        function update(currentTime) {
          const progress = Math.min((currentTime - startTime) / duration, 1);
          const value = Math.floor(progress * to);

          element.textContent = value;

          if (progress < 1) {
            requestAnimationFrame(update);
          } else {
            element.style.transform = "scale(1)";
          }
        }

        requestAnimationFrame(update);
      }

      async function loadVisits() {
        try {
          const res = await fetch("/visits");
          const data = await res.json();

          const el = document.getElementById("visit-count");

          animateCount(el, data.totalUnique);
        } catch (err) {
          console.error("Failed to load visits", err);
        }
      }

      loadVisits();

      async function uploadFile(file, token) {
        const ext = file.name.split(".").pop();
        const nameWithoutExt = file.name.substring(
          0,
          file.name.lastIndexOf("."),
        );
        const newName = `${nameWithoutExt}_${Date.now()}.${ext}`;

        const blob = await put(newName, file, {
          access: "public",
          token: token,
        });
        return blob.url;
      }

      // TAB DEV
      document
        .getElementById("form-dev-js")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const form = e.target;

          const file = form.querySelector('input[name="file"]').files[0];

          const resultDiv = document.getElementById("result-dev");
          const link = document.getElementById("download-link-dev");
          const loading = document.getElementById("loading-dev");
          const button = document.getElementById("button-dev-js");

          link.href = "";
          link.textContent = "";
          resultDiv.style.display = "none";

          loading.style.display = "block";
          button.disabled = true;
          button.textContent = "Uploading...";

          try {
            const resToken = await fetch("/blob-token", {
              method: "GET",
              headers: {
                "Content-Type": "application/json",
              },
            });
            const dataToken = await resToken.json();

            const url = await uploadFile(file, dataToken.token);

            button.textContent = "Processing...";

            const res = await fetch("/upload", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                fileUrl: url,
              }),
            });

            const data = await res.json();

            requestAnimationFrame(() => {
              link.href = data.url;
              link.textContent = data.url;

              resultDiv.style.display = "block";
            });
          } catch (err) {
            alert("Something went wrong!");
            console.error(err);
          } finally {
            loading.style.display = "none";
            button.disabled = false;
            button.textContent = "Convert";
          }
        });

      document
        .getElementById("form-dev-excel")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const form = e.target;

          const file = form.querySelector('input[name="file"]').files[0];
          const keyColumn = form.keyColumn.value || 1;
          const valueColumn = form.valueColumn.value || 2;

          const resultDiv = document.getElementById("result-dev");
          const link = document.getElementById("download-link-dev");
          const loading = document.getElementById("loading-dev");
          const button = document.getElementById("button-dev-excel");

          link.href = "";
          link.textContent = "";
          resultDiv.style.display = "none";

          loading.style.display = "block";
          button.disabled = true;
          button.textContent = "Uploading...";

          try {
            const resToken = await fetch("/blob-token");
            const dataToken = await resToken.json();

            const url = await uploadFile(file, dataToken.token);

            button.textContent = "Processing...";

            const res = await fetch("/upload-excel", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                fileUrl: url,
                keyColumn,
                valueColumn,
              }),
            });

            const data = await res.json();

            requestAnimationFrame(() => {
              link.href = data.url;
              link.textContent = data.url;
              resultDiv.style.display = "block";
            });
          } catch (err) {
            alert("Something went wrong!");
            console.error(err);
          } finally {
            loading.style.display = "none";
            button.disabled = false;
            button.textContent = "Convert Excel → JS";
          }
        });

      // TAB CS
      document
        .getElementById("form-cs")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const form = e.target;

          const file1 = form.querySelector('input[name="file1"]').files[0];
          const file2 = form.querySelector('input[name="file2"]').files[0];

          const keyColumnFile1 = form.keyColumnFile1.value || 1;
          const valueColumnFile1 = form.valueColumnFile1.value || 2;
          const keyColumnFile2 = form.keyColumnFile2.value || 1;
          const valueColumnFile2 = form.valueColumnFile2.value || 2;

          const resultDiv = document.getElementById("result-cs");
          const link = document.getElementById("download-link-cs");
          const loading = document.getElementById("loading-cs");
          const button = document.getElementById("button-cs");

          link.href = "";
          link.textContent = "";
          resultDiv.style.display = "none";

          loading.style.display = "block";
          button.disabled = true;
          button.textContent = "Uploading...";

          try {
            const resToken = await fetch("/blob-token", {
              method: "GET",
              headers: {
                "Content-Type": "application/json",
              },
            });
            const dataToken = await resToken.json();

            const [url1, url2] = await Promise.all([
              uploadFile(file1, dataToken.token),
              uploadFile(file2, dataToken.token),
            ]);

            button.textContent = "Processing...";

            const res = await fetch("/upload-excel-merge-zip", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                file1Url: url1,
                file2Url: url2,
                keyColumnFile1,
                valueColumnFile1,
                keyColumnFile2,
                valueColumnFile2,
              }),
            });

            const data = await res.json();

            requestAnimationFrame(() => {
              link.href = data.url;
              link.textContent = data.url;
              resultDiv.style.display = "block";
            });
          } catch (err) {
            alert("Something went wrong!");
            console.error(err);
          } finally {
            loading.style.display = "none";
            button.disabled = false;
            button.textContent = "Merge";
          }
        });
    </script>
  </body>
</html>
