<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Key Generator Tool</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
        text-align: center;
      }

      .avatar-wrapper {
        position: relative;
        display: inline-block;
      }

      .developer-avatar {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        object-fit: cover;
        border: 3px solid #4caf50;
      }

      .verified-badge {
        position: absolute;
        bottom: 5px;
        right: 5px;
        width: 20px;
        height: 20px;
        background: #4caf50;
        border-radius: 50%;
        border: 2px solid white;
      }

      .developer-name {
        margin-top: 10px;
        font-weight: bold;
      }

      .developer-links img {
        margin: 5px;
      }

      .form-group {
        margin-bottom: 12px;
      }

      input {
        padding: 6px;
        width: 250px;
      }

      button {
        padding: 8px 16px;
        cursor: pointer;
      }

      .tabs {
        display: flex;
        justify-content: center;
        margin-top: 30px;
        cursor: pointer;
      }

      .tab {
        padding: 10px 20px;
        border: 1px solid #ccc;
        border-bottom: none;
        background: #f5f5f5;
      }

      .tab.active {
        background: white;
        font-weight: bold;
      }

      .tab-content {
        border: 1px solid #ccc;
        padding: 20px;
        display: none;
        margin-top: -1px;
      }

      .tab-content.active {
        display: block;
      }

      .spinner {
        margin: 10px auto;
        width: 30px;
        height: 30px;
        border: 4px solid #ccc;
        border-top: 4px solid #4caf50;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>

  <body>
    <div class="avatar-wrapper">
      <img
        class="developer-avatar"
        src="assets/avatar.JPG"
        alt="Developer Avatar"
      />
      <div class="verified-badge"></div>
    </div>

    <div class="developer-name">
      Phạm Tuấn Kiệt – Fullstack Developer & React Native Specialist
    </div>

    <div class="developer-links">
      <a href="https://www.facebook.com/tuankiet29012003" target="_blank">
        <img
          src="https://img.shields.io/badge/Facebook-1877F2?style=for-the-badge&logo=facebook&logoColor=white"
        />
      </a>
      <a href="https://www.linkedin.com/in/kietpt2003" target="_blank">
        <img
          src="https://img.shields.io/badge/LinkedIn-0077B5?style=for-the-badge&logo=linkedin&logoColor=white"
        />
      </a>
    </div>

    <h2>Key Generator Tool</h2>

    <div class="tabs">
      <div class="tab active" onclick="switchTab(0)">For Dev</div>
      <div class="tab" onclick="switchTab(1)">For CS</div>
    </div>

    <div class="tab-content active">
      <h3>JS → Excel</h3>
      <form id="form-dev">
        <div class="form-group">
          <input type="file" name="file" accept=".js" required />
        </div>

        <button id="button-dev" type="submit">Convert</button>
      </form>

      <div id="loading-dev" style="margin-top: 15px; display: none">
        <div class="spinner"></div>
        <div>Processing...</div>
      </div>

      <div id="result-dev" style="margin-top: 20px; display: none">
        <p><strong>Download Link:</strong></p>
        <a id="download-link-dev" href="#" target="_blank"></a>
      </div>
    </div>

    <div class="tab-content">
      <h3>Key generator (2 files)</h3>
      <form id="form-cs">
        <div class="form-group">
          <input type="file" name="file1" required />
        </div>

        <div class="form-group">
          <input
            type="text"
            name="keyColumnFile1"
            placeholder="Key Column File 1"
          />
        </div>

        <div class="form-group">
          <input
            type="text"
            name="valueColumnFile1"
            placeholder="Value Column File 1"
          />
        </div>

        <hr />

        <div class="form-group">
          <input type="file" name="file2" required />
        </div>

        <div class="form-group">
          <input
            type="text"
            name="keyColumnFile2"
            placeholder="Key Column File 2"
          />
        </div>

        <div class="form-group">
          <input
            type="text"
            name="valueColumnFile2"
            placeholder="Value Column File 2"
          />
        </div>

        <button id="button-cs" type="submit">Merge</button>
      </form>

      <div id="loading-cs" style="margin-top: 15px; display: none">
        <div class="spinner"></div>
        <div>Processing...</div>
      </div>

      <div id="result-cs" style="margin-top: 20px; display: none">
        <p><strong>Download Link:</strong></p>
        <a id="download-link-cs" href="#" target="_blank"></a>
      </div>
    </div>

    <script>
      function switchTab(index) {
        const tabs = document.querySelectorAll(".tab");
        const contents = document.querySelectorAll(".tab-content");

        tabs.forEach((t, i) => {
          t.classList.toggle("active", i === index);
          contents[i].classList.toggle("active", i === index);
        });
      }

      function downloadFile(blob, filename) {
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        a.click();
        window.URL.revokeObjectURL(url);
      }

      // TAB DEV
      document
        .getElementById("form-dev")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const formData = new FormData(e.target);

          const resultDiv = document.getElementById("result-dev");
          const link = document.getElementById("download-link-dev");
          const loading = document.getElementById("loading-dev");
          const button = document.getElementById("button-dev");

          link.href = "";
          link.textContent = "";
          resultDiv.style.display = "none";

          loading.style.display = "block";
          button.disabled = true;
          button.textContent = "Processing...";

          try {
            const res = await fetch("/upload", {
              method: "POST",
              body: formData,
            });

            const data = await res.json();

            requestAnimationFrame(() => {
              link.href = data.url;
              link.textContent = data.url;

              resultDiv.style.display = "block";
            });
          } catch (err) {
            alert("Something went wrong!");
            console.error(err);
          } finally {
            loading.style.display = "none";
            button.disabled = false;
            button.textContent = "Convert";
          }
        });

      // TAB CS
      document
        .getElementById("form-cs")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const formData = new FormData(e.target);

          const resultDiv = document.getElementById("result-cs");
          const link = document.getElementById("download-link-cs");
          const loading = document.getElementById("loading-cs");
          const button = document.getElementById("button-cs");

          link.href = "";
          link.textContent = "";
          resultDiv.style.display = "none";

          loading.style.display = "block";
          button.disabled = true;
          button.textContent = "Processing...";

          try {
            const res = await fetch("/upload-excel-merge-zip", {
              method: "POST",
              body: formData,
            });

            const data = await res.json();

            requestAnimationFrame(() => {
              link.href = data.url;
              link.textContent = data.url;

              resultDiv.style.display = "block";
            });
          } catch (err) {
            alert("Something went wrong!");
            console.error(err);
          } finally {
            loading.style.display = "none";
            button.disabled = false;
            button.textContent = "Merge";
          }
        });
    </script>
  </body>
</html>
