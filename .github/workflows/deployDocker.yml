name: Deploy Docker

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image and push
        run: |
          docker buildx build . \
              --file Dockerfile \
              --tag kietmaster2003/convert-locale-app \
              --push \
              --build-arg BLOB_READ_WRITE_TOKEN="${{ secrets.BLOB_READ_WRITE_TOKEN }}" \
              --build-arg DB_USER="${{ secrets.DB_USER }}" \
              --build-arg DB_USER_PASSWORD="${{ secrets.DB_USER_PASSWORD }}" \
              --build-arg DB_CLUSTER_PATH="${{ secrets.DB_CLUSTER_PATH }}" \
              --build-arg DB_NAME="${{ secrets.DB_NAME }}" \
              --build-arg GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
              --build-arg JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              --build-arg ADMIN_EMAIL="${{ secrets.ADMIN_EMAIL }}" \
